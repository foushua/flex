name: Release - Publish Helm Chart

on:
  push:
    tags:
      - 'v*.*.*'
      - 'chart-*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3)'
        required: true
        type: string

env:
  HELM_VERSION: '3.14.0'

jobs:
  # ============================================
  # Job 1: Validate before release
  # ============================================
  validate:
    name: ✅ Pre-release Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Validate chart
        run: |
          helm lint .
          for f in examples/*.yaml; do
            helm lint . -f "$f"
          done

      - name: Check version consistency
        run: |
          CHART_VERSION=$(grep '^version:' Chart.yaml | awk '{print $2}')
          echo "Chart version: $CHART_VERSION"
          
          if [ -n "${{ github.event.inputs.version }}" ]; then
            EXPECTED_VERSION="${{ github.event.inputs.version }}"
          else
            # Extract version from tag (remove 'v' or 'chart-' prefix)
            TAG="${{ github.ref_name }}"
            EXPECTED_VERSION="${TAG#v}"
            EXPECTED_VERSION="${EXPECTED_VERSION#chart-}"
          fi
          
          if [ "$CHART_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "⚠️ Warning: Chart version ($CHART_VERSION) doesn't match expected version ($EXPECTED_VERSION)"
          fi

  # ============================================
  # Job 2: Package and Release
  # ============================================
  release:
    name: 📦 Package & Release
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Package Helm chart
        run: |
          mkdir -p .cr-release-packages
          helm package . -d .cr-release-packages
          echo "📦 Packaged charts:"
          ls -la .cr-release-packages/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: .cr-release-packages/*.tgz
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Job 3: Publish to GitHub Pages (Helm repo)
  # ============================================
  publish-pages:
    name: 🌐 Publish to GitHub Pages
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Package chart
        run: |
          CHART_NAME=$(grep '^name:' Chart.yaml | awk '{print $2}')
          CHART_VERSION=$(grep '^version:' Chart.yaml | awk '{print $2}')
          echo "📦 Packaging $CHART_NAME version $CHART_VERSION..."
          
          mkdir -p .cr-release-packages
          helm package . -d .cr-release-packages
          
          # Add .nojekyll to prevent Jekyll processing on gh-pages
          touch .cr-release-packages/.nojekyll
          
          echo "CHART_NAME=$CHART_NAME" >> $GITHUB_ENV
          echo "CHART_VERSION=$CHART_VERSION" >> $GITHUB_ENV
          
          ls -la .cr-release-packages/

      - name: Update gh-pages index
        run: |
          # Use the actual tag name for the URL (matches GitHub Release)
          RELEASE_TAG="${{ github.ref_name }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}"
          
          # Check if gh-pages branch exists
          if git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            echo "📥 gh-pages branch exists, fetching..."
            git fetch origin gh-pages
            git worktree add gh-pages-branch origin/gh-pages
            
            echo "📝 Merging with existing index..."
            helm repo index .cr-release-packages --url "${RELEASE_URL}" --merge gh-pages-branch/index.yaml
          else
            echo "🆕 gh-pages branch doesn't exist, creating..."
            # Create orphan branch for gh-pages
            git worktree add --detach gh-pages-branch
            cd gh-pages-branch
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            cd ..
            
            echo "📝 Creating new index..."
            helm repo index .cr-release-packages --url "${RELEASE_URL}"
          fi
          
          # Copy new index and .nojekyll to gh-pages branch
          cp .cr-release-packages/index.yaml gh-pages-branch/
          cp .cr-release-packages/.nojekyll gh-pages-branch/
          
          # Commit and push
          cd gh-pages-branch
          git add index.yaml .nojekyll
          git commit -m "Update Helm repository index for ${{ env.CHART_NAME }}-${{ env.CHART_VERSION }}" || echo "No changes to commit"
          git push origin HEAD:gh-pages
          
          echo "✅ Index updated on gh-pages branch"

  # ============================================
  # Job 4: Publish to OCI Registry (GHCR)
  # ============================================
  publish-oci:
    name: 🐳 Publish to OCI Registry
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push to GHCR
        run: |
          CHART_NAME=$(grep '^name:' Chart.yaml | awk '{print $2}')
          CHART_VERSION=$(grep '^version:' Chart.yaml | awk '{print $2}')
          
          echo "📦 Packaging $CHART_NAME version $CHART_VERSION..."
          helm package .
          
          echo "🚀 Pushing to ghcr.io/${{ github.repository_owner }}/$CHART_NAME:$CHART_VERSION"
          helm push "${CHART_NAME}-${CHART_VERSION}.tgz" oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Logout from registry
        run: helm registry logout ghcr.io
        if: always()
