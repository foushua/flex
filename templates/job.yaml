{{- if eq .Values.workload.type "job" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "flex.fullname" . }}
  namespace: {{ include "flex.namespace" . }}
  labels:
    {{- include "flex.labels" . | nindent 4 }}
  {{- $annotations := include "flex.resourceAnnotations" (dict "context" . "annotations" dict) }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.workload.job.backoffLimit }}
  backoffLimit: {{ .Values.workload.job.backoffLimit }}
  {{- end }}
  {{- if .Values.workload.job.completions }}
  completions: {{ .Values.workload.job.completions }}
  {{- end }}
  {{- if .Values.workload.job.parallelism }}
  parallelism: {{ .Values.workload.job.parallelism }}
  {{- end }}
  {{- if .Values.workload.job.activeDeadlineSeconds }}
  activeDeadlineSeconds: {{ .Values.workload.job.activeDeadlineSeconds }}
  {{- end }}
  {{- if .Values.workload.job.ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ .Values.workload.job.ttlSecondsAfterFinished }}
  {{- end }}
  template:
    metadata:
      {{- include "flex.podMetadata" . | nindent 6 }}
    spec:
      restartPolicy: {{ .Values.workload.job.restartPolicy }}
      {{- include "flex.podSpec" . | nindent 6 }}
{{- end }}
