{{- if .Values.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "flex.fullname" . }}
  {{- if .Values.prometheusRule.namespace }}
  namespace: {{ .Values.prometheusRule.namespace }}
  {{- else }}
  namespace: {{ include "flex.namespace" . }}
  {{- end }}
  labels:
    {{- include "flex.resourceLabels" (dict "context" . "labels" .Values.prometheusRule.labels) | nindent 4 }}
  {{- $annotations := include "flex.resourceAnnotations" (dict "context" . "annotations" .Values.prometheusRule.annotations) }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
spec:
  groups:
    {{- toYaml .Values.prometheusRule.groups | nindent 4 }}
{{- end }}
