# DaemonSet Agent Example
# This example shows a logging/monitoring agent deployed to all nodes

global:
  nameOverride: "log-agent"

workload:
  type: daemonset
  daemonset:
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 1

container:
  image:
    repository: fluent/fluent-bit
    tag: "2.1"
  ports:
    - name: http
      containerPort: 2020
    - name: forward
      containerPort: 24224
  env:
    - name: NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: FLUENT_ELASTICSEARCH_HOST
      value: elasticsearch.logging.svc
    - name: FLUENT_ELASTICSEARCH_PORT
      value: "9200"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  livenessProbe:
    enabled: true
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    enabled: true
    httpGet:
      path: /api/v1/health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
  volumeMounts:
    - name: varlog
      mountPath: /var/log
      readOnly: true
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true
    - name: configmap-fluent-bit-config
      mountPath: /fluent-bit/etc/
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false

service:
  enabled: true
  type: ClusterIP
  ports:
    - name: http
      port: 2020
      targetPort: http
    - name: forward
      port: 24224
      targetPort: forward

configMaps:
  fluent-bit-config:
    enabled: true
    data:
      fluent-bit.conf: |
        [SERVICE]
            Flush         5
            Daemon        Off
            Log_Level     info
            Parsers_File  parsers.conf
            HTTP_Server   On
            HTTP_Listen   0.0.0.0
            HTTP_Port     2020
            Health_Check  On

        [INPUT]
            Name              tail
            Tag               kube.*
            Path              /var/log/containers/*.log
            Parser            docker
            DB                /var/log/flb_kube.db
            Mem_Buf_Limit     50MB
            Skip_Long_Lines   On
            Refresh_Interval  10

        [FILTER]
            Name                kubernetes
            Match               kube.*
            Kube_URL            https://kubernetes.default.svc:443
            Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
            Merge_Log           On

        [OUTPUT]
            Name            es
            Match           *
            Host            ${FLUENT_ELASTICSEARCH_HOST}
            Port            ${FLUENT_ELASTICSEARCH_PORT}
            Logstash_Format On
            Retry_Limit     False

      parsers.conf: |
        [PARSER]
            Name        docker
            Format      json
            Time_Key    time
            Time_Format %Y-%m-%dT%H:%M:%S.%L
            Time_Keep   On

volumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers

serviceAccount:
  create: true

rbac:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["namespaces", "pods"]
      verbs: ["get", "list", "watch"]

podSecurityContext:
  runAsUser: 0  # Required for reading host logs

tolerations:
  - operator: Exists
    effect: NoSchedule
  - operator: Exists
    effect: NoExecute

priorityClassName: system-node-critical

