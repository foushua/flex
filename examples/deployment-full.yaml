# Full Deployment Example
# This example shows a production-ready deployment with all features

global:
  nameOverride: "my-app"
  commonLabels:
    team: platform
    environment: production
  commonAnnotations:
    owner: platform-team@example.com

workload:
  type: deployment
  replicaCount: 3
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600
  deployment:
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0

container:
  image:
    registry: docker.io
    repository: myorg/my-app
    tag: "v1.2.3"
    pullPolicy: IfNotPresent
  ports:
    - name: http
      containerPort: 8080
    - name: metrics
      containerPort: 9090
  env:
    - name: APP_ENV
      value: production
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: my-app-db-secrets
          key: url
  envFrom:
    - configMapRef:
        name: my-app-app-config
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  livenessProbe:
    enabled: true
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    enabled: true
    httpGet:
      path: /ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
  startupProbe:
    enabled: true
    httpGet:
      path: /healthz
      port: http
    failureThreshold: 30
    periodSeconds: 10
  lifecycle:
    preStop:
      exec:
        command: ["/bin/sh", "-c", "sleep 10"]
  volumeMounts:
    - name: configmap-app-config
      mountPath: /etc/config
      readOnly: true
    - name: cache
      mountPath: /tmp/cache
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

sidecars:
  log-shipper:
    image:
      repository: fluent/fluent-bit
      tag: "2.1"
    env:
      - name: LOG_LEVEL
        value: info
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
    volumeMounts:
      - name: logs
        mountPath: /var/log/app

initContainers:
  wait-for-db:
    image:
      repository: busybox
      tag: "1.36"
    command: ["sh", "-c", "until nc -z database 5432; do sleep 2; done"]
    resources:
      requests:
        cpu: 10m
        memory: 16Mi

service:
  enabled: true
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: metrics
      port: 9090
      targetPort: metrics

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: my-app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: my-app-tls
      hosts:
        - my-app.example.com

configMaps:
  app-config:
    enabled: true
    data:
      config.yaml: |
        server:
          port: 8080
        logging:
          level: info
          format: json

secrets:
  db-secrets:
    enabled: true
    type: Opaque
    stringData:
      url: "postgresql://user:pass@database:5432/myapp"

persistence:
  enabled: true
  storageClass: standard
  accessModes:
    - ReadWriteOnce
  size: 10Gi

volumes:
  - name: cache
    emptyDir: {}
  - name: logs
    emptyDir: {}

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/my-app-role

rbac:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["configmaps"]
      verbs: ["get", "list", "watch"]

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

nodeSelector:
  kubernetes.io/os: linux

tolerations:
  - key: "dedicated"
    operator: "Equal"
    value: "app"
    effect: "NoSchedule"

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: my-app
          topologyKey: kubernetes.io/hostname

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: my-app

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max

pdb:
  enabled: true
  minAvailable: 2

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: database
      ports:
        - protocol: TCP
          port: 5432

serviceMonitor:
  enabled: true
  labels:
    release: prometheus
  interval: 30s
  scrapeTimeout: 10s
  endpoints:
    - port: metrics
      path: /metrics

prometheusRule:
  enabled: true
  labels:
    release: prometheus
  groups:
    - name: my-app-alerts
      rules:
        - alert: HighErrorRate
          expr: |
            sum(rate(http_requests_total{status=~"5..", job="my-app"}[5m])) /
            sum(rate(http_requests_total{job="my-app"}[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: High error rate detected
            description: "Error rate is {{ $value | humanizePercentage }}"
        - alert: PodNotReady
          expr: kube_pod_status_ready{condition="false", pod=~"my-app.*"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Pod not ready
            description: "Pod {{ $labels.pod }} is not ready"
