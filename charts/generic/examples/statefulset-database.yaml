# StatefulSet Database Example
# This example shows a PostgreSQL-like database deployment

global:
  nameOverride: "postgres"

workload:
  type: statefulset
  replicaCount: 3
  statefulset:
    podManagementPolicy: OrderedReady
    updateStrategy:
      type: RollingUpdate
    volumeClaimTemplates: []  # Using persistence instead

container:
  image:
    repository: postgres
    tag: "15-alpine"
  ports:
    - name: postgres
      containerPort: 5432
  env:
    - name: POSTGRES_DB
      value: mydb
    - name: POSTGRES_USER
      valueFrom:
        secretKeyRef:
          name: postgres-db-creds
          key: username
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: postgres-db-creds
          key: password
    - name: PGDATA
      value: /var/lib/postgresql/data/pgdata
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  livenessProbe:
    enabled: true
    exec:
      command:
        - pg_isready
        - -U
        - postgres
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    enabled: true
    exec:
      command:
        - pg_isready
        - -U
        - postgres
    initialDelaySeconds: 5
    periodSeconds: 5
  volumeMounts:
    - name: data
      mountPath: /var/lib/postgresql/data
  securityContext:
    runAsUser: 999
    runAsGroup: 999

service:
  enabled: true
  type: ClusterIP
  publishNotReadyAddresses: true
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres

persistence:
  enabled: true
  storageClass: fast-ssd
  accessModes:
    - ReadWriteOnce
  size: 50Gi

secrets:
  db-creds:
    enabled: true
    type: Opaque
    stringData:
      username: postgres
      password: supersecretpassword

serviceAccount:
  create: true

podSecurityContext:
  fsGroup: 999

nodeSelector:
  node-type: database

tolerations:
  - key: "dedicated"
    operator: "Equal"
    value: "database"
    effect: "NoSchedule"

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: postgres
        topologyKey: kubernetes.io/hostname

pdb:
  enabled: true
  maxUnavailable: 1

serviceMonitor:
  enabled: true
  labels:
    release: prometheus
  endpoints:
    - port: postgres
      path: /metrics
      # Note: Requires postgres_exporter sidecar
