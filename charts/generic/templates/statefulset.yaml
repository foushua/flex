{{- if eq .Values.workload.type "statefulset" }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "generic.fullname" . }}
  namespace: {{ include "generic.namespace" . }}
  labels:
    {{- include "generic.labels" . | nindent 4 }}
  {{- $annotations := include "generic.resourceAnnotations" (dict "context" . "annotations" dict) }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
spec:
  serviceName: {{ include "generic.statefulset.serviceName" . }}
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.workload.replicaCount }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.workload.revisionHistoryLimit }}
  {{- if .Values.workload.minReadySeconds }}
  minReadySeconds: {{ .Values.workload.minReadySeconds }}
  {{- end }}
  podManagementPolicy: {{ .Values.workload.statefulset.podManagementPolicy }}
  {{- with .Values.workload.statefulset.updateStrategy }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "generic.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- include "generic.podMetadata" . | nindent 6 }}
    spec:
      {{- include "generic.podSpec" . | nindent 6 }}
  {{- if or .Values.workload.statefulset.volumeClaimTemplates .Values.persistence.enabled }}
  volumeClaimTemplates:
    {{- if .Values.persistence.enabled }}
    - metadata:
        name: data
        {{- with .Values.persistence.labels }}
        labels:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        {{- if .Values.persistence.volumeMode }}
        volumeMode: {{ .Values.persistence.volumeMode }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
        {{- with .Values.persistence.selector }}
        selector:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.persistence.dataSource }}
        dataSource:
          {{- toYaml . | nindent 10 }}
        {{- end }}
    {{- end }}
    {{- range .Values.workload.statefulset.volumeClaimTemplates }}
    - metadata:
        name: {{ .metadata.name }}
        {{- with .metadata.labels }}
        labels:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .metadata.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        {{- toYaml .spec | nindent 8 }}
    {{- end }}
  {{- end }}
{{- end }}
